{
	"enableASP":true,
	#Boolean. Set to false to turn off Ursulo system. Doesn't affect procgen.
	"enableASPCourierFleets":true,
	#Boolean. Set to false to turn off ASP Syndicate Courier Fleets.
	"enableASPHitSquads":true,
	#Boolean. Set to false to turn off ASP Syndicate Hit Squads. Needs courier fleets to trigger, won't enable without above being true.
	
	"enablePACK":true,
	#Boolean. Set to false to turn off Canis system. Doesn't affect procgen. Does affect Christchurch in Breh'inni, whether that is PACK colony or just empty planet.
	"enablePACKDiplomats":true,
	#nothing implemented
	
	"enableJunkPirates":true,
	#Boolean. Set to false to turn off Breh'inni system. Doesn't affect procgen.
	#Note regards above: Other aspects unaffected (game still, technically, contains all BPs, ships etc. but presence will be severely impacted without home systems)
	#These aren't very clever switches but they do cut out the main systems. They have no impact on e.g. Exerelin Random Mode.
	"enableJunkExplorers":true,
	#Switches off the junk explorers which occasionally spawn from JP worlds.
	
	"enableJunkPiratesIntel":false,
	#Currently a bit buggy ... off by default. Turn on for occasional unexplained crashes, pending fix ...
	#Intel objects are breaking across save / load cycles. Need to be fixed.
	
	"junkPiratesFleetFrequencyModifier":1,
	#float; bigger for more often spawning of fleets, ratio default 1. Works. Probably no need to change.
	"junkPiratesMaxFleetModifier":1,
	#float; normally approximately 15-25 of the (maximum) fleet types; capping out depending on frequency. Depending on certain things, normally. Put higher for more.
	#affects all ASP, JP fleets. Tweak if you want, but also useful for debugging.
	
	"enableProcGen":true,
	#Boolean. Set to false to turn off all procgen elements inc. Anarchists, Spinerettes, Anarchist research stations, (wild) derelict tangerines, Junk Pirate ship graveyards etc.
	
	"enableSpinerettes":true,
	#Boolean. These are the Automata Swarms that occasionally generate in orbit of Cryovolcanic worlds with rich rare ore resources.
	#Note if procgen is disabled, this will be also disabled regardless of this particular setting.
	
	"skipProbability":0.9,
	#Float. Chance (0-1) that a constellation will be skipped over during world gen, once minimum constellations have been dealt with. Good way to shift chances about, low skip prob means higher chance of hitting max constellations.

	"minAnarchistConstellations":3,
	#Int default 3. Whether you get (many) more systems than this depends on max plus skipProbability ...
	
	"maxAnarchistConstellations":6,
	#Int default 6. Should stop generating systems after this point.
	#Note min and max will always be subject to other factors including what the world gen looks like, how many candidates avaialable, whether systems are suitable etc.
	# 3-6 seems to give around about 15 planets, probably a couple of 'Hard' Anarchist Stations, 3-5 derelict Tangerines, then a few random systems full of (JP-centric) debris, mining stations whatever.
	# Adjust appropriately if you are using Adjusted Sector.
	
	"softMaxSpinerettes":3,
	#Int beyond this number it becomes hard to generate more, default 3. It rarely hits much above 3 anyway as its unlikely to generate more than about 7 suitable candidate planets in a typical Normal gen.
}
